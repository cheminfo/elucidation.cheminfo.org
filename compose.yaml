# Port-published deployment, used for local runs of the full stack.
# The frontend is published on PORT and proxies nothing: point the API endpoint in the
# app's settings at http://localhost:8000, or put both behind a reverse proxy.
services:
  frontend:
    image: ghcr.io/cheminfo/elucidation-frontend:latest
    build: .
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      core: 0
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 256
    ports:
      - '${PORT:-10718}:80'

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Documented exception, same shape as the nginx one: the redis entrypoint starts as
    # root and drops to the redis user, so it needs SETUID/SETGID for setpriv and CHOWN
    # for the chown of /data it performs first. With a bare `cap_drop: ALL` it exits
    # immediately with "setpriv: setresuid failed: Operation not permitted", never
    # registers in Docker's DNS, and every api call then fails to resolve `redis`.
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ulimits:
      core: 0
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
    pids_limit: 256
    volumes:
      - ./data/redis:/data

  api:
    image: adrianmirza/elucidation:latest
    depends_on:
      - vectordb
      - forward_synthesis
      - redis
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 64g
    cpus: 16
    pids_limit: 512
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - '8000:8000'
    volumes:
      - ./cache:/app/cache

  worker:
    image: adrianmirza/celery
    command: celery -A celery_config.celery_app worker -l info -Q spectrum_queue --concurrency=16
    depends_on:
      - redis
      - api
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 32g
    cpus: 16
    pids_limit: 1024
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./cache:/app/cache

  # No cap_drop or read_only: opaque third-party images with undocumented requirements.
  vectordb:
    image: adrianmirza/retrieval
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    mem_limit: 128g
    cpus: 4
    pids_limit: 1024
    volumes:
      - ./pubchem_vector_db_hnsw_pqm_16_ef_256_m_32:/pubchem_vector_db_hnsw_pq.index

  forward_synthesis:
    image: adrianmirza/forward_synthesis
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    mem_limit: 8g
    cpus: 4
    pids_limit: 512
