# Port-published deployment, used for local runs of the full stack.
# The frontend is published on PORT and proxies nothing: point the API endpoint in the
# app's settings at http://localhost:8000, or put both behind a reverse proxy.
services:
  frontend:
    image: ghcr.io/cheminfo/elucidation-frontend:latest
    build: .
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      core: 0
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 0.25
    pids_limit: 256
    ports:
      - '${PORT:-10718}:80'

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    init: true
    security_opt:
      - no-new-privileges:true
    # Deliberately not capability-hardened, unlike the other services. Its entrypoint
    # runs as root to chown /data and then drops to the redis user, which needs
    # SETUID/SETGID/CHOWN *and* DAC_READ_SEARCH: the appendonlydir it created earlier is
    # mode 0700 owned by redis, and a root without DAC_READ_SEARCH cannot even traverse
    # it, so the entrypoint's `find` fails and takes the container down with it. Dropping
    # capabilities here cost two production outages; the caps that would be needed to
    # keep it working are broad enough that dropping them buys very little.
    ulimits:
      core: 0
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.25
    pids_limit: 256
    volumes:
      - ./data/redis:/data

  api:
    image: adrianmirza/elucidation:latest
    depends_on:
      - vectordb
      - forward_synthesis
      - redis
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 4g
    cpus: 1
    pids_limit: 512
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - '8000:8000'
    volumes:
      - ./cache:/app/cache

  worker:
    image: adrianmirza/celery
    # Sized for the latency of one run, not for concurrency nobody uses: the queue has
    # taken 8 jobs in its lifetime, so 12 slots bought nothing while starving the two
    # services a run actually waits on. Six slots is still six concurrent runs.
    #
    # The GA itself is sequential, but it blocks on vectordb and forward_synthesis every
    # generation, so their cores set the wall clock of a single job.
    command: celery -A celery_config.celery_app worker -l info -Q spectrum_queue --concurrency=6
    depends_on:
      - redis
      - api
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 24g
    cpus: 6
    pids_limit: 1024
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # One thread per slot. Six concurrent tasks each spawning a 20-thread torch pool
      # would put 120 threads on six cores, where they mostly fight each other.
      # This assumes the worker orchestrates and the sidecars compute. If profiling ever
      # shows the GA itself is CPU-bound in-process, raise these and drop concurrency to
      # match — a lone job would otherwise be held to one core with five idle.
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    volumes:
      - ./cache:/app/cache

  # No cap_drop or read_only: opaque third-party images with undocumented requirements.
  vectordb:
    image: adrianmirza/retrieval
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    mem_limit: 64g
    cpus: 4
    pids_limit: 1024
    environment:
      # cpus is a CFS quota, not an affinity mask: the container still sees all 20 host
      # cores, so torch/OpenMP/BLAS size their pools to 20 and then spin at barriers
      # inside a much smaller quota. Pin the pools to the quota instead.
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    volumes:
      - ./pubchem_vector_db_hnsw_pqm_16_ef_256_m_32:/pubchem_vector_db_hnsw_pq.index

  forward_synthesis:
    image: adrianmirza/forward_synthesis
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    mem_limit: 8g
    cpus: 4
    pids_limit: 512
    environment:
      # cpus is a CFS quota, not an affinity mask: the container still sees all 20 host
      # cores, so torch/OpenMP/BLAS size their pools to 20 and then spin at barriers
      # inside a much smaller quota. Pin the pools to the quota instead.
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
