services:
  # The web interface. Served at the root of the host, same-origin with the API below,
  # so the browser calls relative paths and CORS never enters the picture.
  frontend:
    image: ghcr.io/cheminfo/elucidation-frontend:latest
    build: .
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      core: 0
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 0.25
    pids_limit: 256
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.services.elucidation-frontend.loadbalancer.server.port=80'
      # Low priority: this catches everything the API router below does not claim.
      - 'traefik.http.routers.elucidation-frontend.rule=Host(`elucidation.cheminfo.org`)'
      - 'traefik.http.routers.elucidation-frontend.priority=50'
      - 'traefik.http.routers.elucidation-frontend.entrypoints=websecure'
      - 'traefik.http.routers.elucidation-frontend.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.elucidation-frontend.service=elucidation-frontend'
    networks:
      - traefik

  # Redis message broker for Celery.
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    init: true
    security_opt:
      - no-new-privileges:true
    # Deliberately not capability-hardened, unlike the other services. Its entrypoint
    # runs as root to chown /data and then drops to the redis user, which needs
    # SETUID/SETGID/CHOWN *and* DAC_READ_SEARCH: the appendonlydir it created earlier is
    # mode 0700 owned by redis, and a root without DAC_READ_SEARCH cannot even traverse
    # it, so the entrypoint's `find` fails and takes the container down with it. Dropping
    # capabilities here cost two production outages; the caps that would be needed to
    # keep it working are broad enough that dropping them buys very little.
    ulimits:
      core: 0
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.25
    pids_limit: 256
    volumes:
      - ./data/redis:/data

  api:
    image: adrianmirza/elucidation:latest
    depends_on:
      - vectordb
      - forward_synthesis
      - redis
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 4g
    cpus: 1
    pids_limit: 512
    labels:
      - 'traefik.enable=true'
      # The container is on two networks, so Traefik cannot infer the port.
      - 'traefik.http.services.elucidation.loadbalancer.server.port=8000'

      # Submissions get their own router so the rate limit applies to them alone.
      # It must out-prioritise the general API router below, which also matches /submit.
      - 'traefik.http.routers.elucidation-submit.rule=Host(`elucidation.cheminfo.org`) && Path(`/submit`)'
      - 'traefik.http.routers.elucidation-submit.priority=110'
      - 'traefik.http.routers.elucidation-submit.entrypoints=websecure'
      - 'traefik.http.routers.elucidation-submit.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.elucidation-submit.service=elucidation'
      - 'traefik.http.routers.elucidation-submit.middlewares=elucidation-cors,elucidation-submit-ratelimit'

      # Everything else the API owns. No rate limit here: the interface polls
      # /jobs/{id}/status every 10s per running job and /queue/stats every 30s, so a
      # limit meant for submissions would lock the app out within seconds.
      - 'traefik.http.routers.elucidation.rule=Host(`elucidation.cheminfo.org`) && (PathPrefix(`/jobs`) || PathPrefix(`/queue`) || PathPrefix(`/workers`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`))'
      - 'traefik.http.routers.elucidation.priority=100'
      - 'traefik.http.routers.elucidation.entrypoints=websecure'
      - 'traefik.http.routers.elucidation.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.elucidation.service=elucidation'
      - 'traefik.http.routers.elucidation.middlewares=elucidation-cors'

      # CORS for third-party clients. allowmethods was missing before, which made a
      # DELETE preflight (job cancellation) fail.
      - 'traefik.http.middlewares.elucidation-cors.headers.accesscontrolalloworiginlist=*'
      - 'traefik.http.middlewares.elucidation-cors.headers.accesscontrolallowheaders=Content-Type'
      - 'traefik.http.middlewares.elucidation-cors.headers.accesscontrolallowmethods=GET,POST,DELETE,OPTIONS'
      - 'traefik.http.middlewares.elucidation-cors.headers.accesscontrolmaxage=86400'

      # Every accepted submission occupies a worker for 20-45 minutes and there is no
      # authentication, so submissions are rate limited per source address. This applies
      # only to the elucidation-submit router above.
      - 'traefik.http.middlewares.elucidation-submit-ratelimit.ratelimit.average=10'
      - 'traefik.http.middlewares.elucidation-submit-ratelimit.ratelimit.period=1h'
      - 'traefik.http.middlewares.elucidation-submit-ratelimit.ratelimit.burst=3'
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./cache:/app/cache
    networks:
      - default
      - traefik

  worker:
    image: adrianmirza/celery
    # Sized for the latency of one run, not for concurrency nobody uses: the queue has
    # taken 8 jobs in its lifetime, so 12 slots bought nothing while starving the two
    # services a run actually waits on. Six slots is still six concurrent runs.
    #
    # The GA itself is sequential, but it blocks on vectordb and forward_synthesis every
    # generation, so their cores set the wall clock of a single job.
    command: celery -A celery_config.celery_app worker -l info -Q spectrum_queue --concurrency=6
    depends_on:
      - redis
      - api
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 24g
    cpus: 6
    pids_limit: 1024
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # One thread per slot. Six concurrent tasks each spawning a 20-thread torch pool
      # would put 120 threads on six cores, where they mostly fight each other.
      # This assumes the worker orchestrates and the sidecars compute. If profiling ever
      # shows the GA itself is CPU-bound in-process, raise these and drop concurrency to
      # match — a lone job would otherwise be held to one core with five idle.
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    volumes:
      # Must match the api service exactly: both read and write the same result files.
      - ./cache:/app/cache

  # Vector database holding the PubChem reference index.
  # No cap_drop or read_only: this is an opaque third-party image whose required
  # capabilities and writable paths are not documented.
  vectordb:
    image: adrianmirza/retrieval
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    mem_limit: 64g
    cpus: 4
    pids_limit: 1024
    environment:
      # cpus is a CFS quota, not an affinity mask: the container still sees all 20 host
      # cores, so torch/OpenMP/BLAS size their pools to 20 and then spin at barriers
      # inside a much smaller quota. Pin the pools to the quota instead.
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
    volumes:
      - ./pubchem_vector_db_hnsw_pqm_16_ef_256_m_32:/pubchem_vector_db_hnsw_pq.index

  # Forward synthesis service. Same third-party caveat as vectordb.
  forward_synthesis:
    image: adrianmirza/forward_synthesis
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    mem_limit: 8g
    cpus: 4
    pids_limit: 512
    environment:
      # cpus is a CFS quota, not an affinity mask: the container still sees all 20 host
      # cores, so torch/OpenMP/BLAS size their pools to 20 and then spin at barriers
      # inside a much smaller quota. Pin the pools to the quota instead.
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4

networks:
  traefik:
    external: true
